<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MVP Todo List</title>
    <link rel="stylesheet" href="../shared/styles.css" />
    <script type="module" src="./usage.js"></script>
  </head>
  <body class="app">
    <div class="app-container">
      <div class="app-header">
        <h1 class="app-title">Todo List <span class="app-badge">MVP</span></h1>
        <button id="theme-toggle" class="theme-toggle">☀️</button>
      </div>

      <div class="card">
        <form id="todo-form" class="todo-form">
          <div class="todo-form-row">
            <input
              type="text"
              id="todo-input"
              placeholder="Add a new task..."
              class="todo-input"
              required
            />
            <button type="submit" class="todo-submit">+</button>
          </div>
        </form>

        <div id="todo-list" class="todo-list"></div>
      </div>
    </div>
  </body>
</html>
